<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Target 550">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(25 .5 .5)">
      <stop offset="0" stop-color="#ff9b92"/><stop offset="1" stop-color="#ff5f56"/>
    </linearGradient>
    <linearGradient id="bd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2231a"/><stop offset="1" stop-color="#b00000"/>
    </linearGradient>
    <radialGradient id="sh" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#000" stop-opacity="0.28"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <g opacity="0.08" fill="#ffffff">
    <circle cx="120" cy="110" r="160"/><circle cx="700" cy="500" r="200"/>
  </g>
  <ellipse cx="400" cy="470" rx="280" ry="40" fill="url(#sh)"/>
  <!-- wheels -->
  <g>
    <circle cx="250" cy="430" r="92" fill="#1f2937"/><circle cx="250" cy="430" r="52" fill="#374151"/><circle cx="250" cy="430" r="22" fill="#9ca3af"/>
    <circle cx="560" cy="430" r="92" fill="#1f2937"/><circle cx="560" cy="430" r="52" fill="#374151"/><circle cx="560" cy="430" r="22" fill="#9ca3af"/>
  </g>
  <!-- body -->
  <path d="M170 360 Q150 300 230 295 L330 290 Q360 250 430 255 L520 260 Q610 265 640 330 Q660 380 600 395 L560 395 A92 92 0 0 0 380 410 L330 410 A92 92 0 0 0 170 405 Z" fill="url(#bd)" stroke="#920000" stroke-width="4"/>
  <!-- fenders -->
  <path d="M158 425 a92 92 0 0 1 184 0" fill="none" stroke="#ce0f06" stroke-width="18" stroke-linecap="round"/>
  <path d="M468 425 a92 92 0 0 1 184 0" fill="none" stroke="#ce0f06" stroke-width="18" stroke-linecap="round"/>
  <!-- seat -->
  <path d="M360 285 Q420 250 500 270 L500 300 L370 305 Z" fill="#111827"/>
  <!-- handlebar -->
  <line x1="330" y1="290" x2="300" y2="220" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
  <line x1="280" y1="215" x2="330" y2="225" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
  <!-- headlight -->
  <circle cx="640" cy="320" r="20" fill="#fde68a" stroke="#920000" stroke-width="3"/>
  <!-- text -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="40" y="40" rx="10" height="46" width="114" fill="#111827" opacity="0.85"/>
    <text x="60" y="72" fill="#ffffff" font-size="28" font-weight="700">TGB</text>
    <text x="40" y="555" fill="#ffffff" font-size="34" font-weight="800" opacity="0.96">Target 550</text>
    <text x="700" y="80" fill="#ffffff" font-size="26" font-weight="700" text-anchor="end" opacity="0.9">2022</text>
  </g>
